name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install
        run: npm ci --no-audit --no-fund

      # Tests run first: the constitution requires the test suite to pass
      # before any other quality check.
      - name: Test
        run: npm test

      # Fast standalone type signal (does not wait for the full Next build).
      - name: Type check
        run: npm run typecheck

      # Smoke build (also exercises the Next.js type layer / route validation).
      - name: Build
        run: npm run build

      # Lint stays non-blocking: `next lint` is deprecated and ESLint is not
      # yet configured in this repo (flat-config migration is a separate task).
      - name: Lint
        run: npm run lint || true
