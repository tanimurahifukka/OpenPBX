services:
  asterisk:
    build:
      context: ./asterisk
    container_name: openpbx-asterisk
    restart: unless-stopped
    # Mac の Docker Desktop は host network mode が beta なので、必要ポートを明示マッピング。
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
      - "10000-10020:10000-10020/udp"
      - "8088:8088/tcp"
      - "8089:8089/tcp"
    volumes:
      - ./asterisk/pjsip.conf:/etc/asterisk/pjsip.conf:ro
      - ./asterisk/pjsip.d:/etc/asterisk/pjsip.d
      - ./asterisk/dialplan.d:/etc/asterisk/dialplan.d
      - ./asterisk/extensions.conf:/etc/asterisk/extensions.conf:ro
      - ./asterisk/asterisk.conf:/etc/asterisk/asterisk.conf:ro
      - ./asterisk/modules.conf:/etc/asterisk/modules.conf:ro
      - ./asterisk/logger.conf:/etc/asterisk/logger.conf:ro
      - ./asterisk/rtp.conf:/etc/asterisk/rtp.conf:ro
      - ./asterisk/manager.conf:/etc/asterisk/manager.conf.template:ro
      - ./asterisk/cdr.conf:/etc/asterisk/cdr.conf:ro
      - ./asterisk/http.conf:/etc/asterisk/http.conf:ro
      - ./asterisk/certs:/etc/asterisk/certs:ro
      - ./asterisk/notify-event.sh:/usr/local/bin/notify-event.sh:ro
      - ./asterisk/entrypoint.sh:/usr/local/bin/entrypoint.sh:ro
      - ./asterisk/sounds/custom:/var/lib/asterisk/sounds/custom:ro
      - ./data/recordings:/var/spool/asterisk/monitor
      - ./data/signals:/signals
      - ./data/inbox:/inbox
      - ./data/asterisk-cdr:/var/log/asterisk/cdr-csv
    environment:
      INBOX_DIR: /inbox
      # entrypoint.sh が manager.conf.template の __AMI_SECRET__ をこの値で置換して生成する。
      AMI_SECRET: ${AMI_SECRET:?AMI_SECRET must be set in .env}
    command: ["/usr/local/bin/entrypoint.sh"]
    networks:
      - openpbx

  web:
    build:
      context: ./apps/web
    container_name: openpbx-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data/db:/app/data/db
      - ./data/inbox:/app/data/inbox:ro
      - ./data/recordings:/app/data/recordings:ro
      - ./data/asterisk-cdr:/app/data/asterisk-cdr:ro
      # event-v1 outbox: watcher が upgrade した <eventId>.json を書き、push loop が読む。
      # コンテナ再起動で消えないようホスト側 ./data/outbox-v1 に永続化する。
      - ./data/outbox-v1:/app/data/outbox-v1
      - ./asterisk/sounds:/sounds
      - ./asterisk/pjsip.d:/asterisk/pjsip.d
      - ./asterisk/dialplan.d:/asterisk/dialplan.d
      - ./data/signals:/asterisk/signals
    environment:
      NODE_ENV: production
      DATABASE_PATH: /app/data/db/command-room.sqlite
      RECORDINGS_DIR: /app/data/recordings
      INBOX_DIR: /app/data/inbox
      PJSIP_OUT_DIR: /asterisk/pjsip.d
      DIALPLAN_OUT_DIR: /asterisk/dialplan.d
      ASTERISK_SIGNAL_DIR: /asterisk/signals
      AMI_HOST: asterisk
      AMI_PORT: "5038"
      AMI_USERNAME: ${AMI_USERNAME:?AMI_USERNAME must be set in .env}
      AMI_SECRET: ${AMI_SECRET:?AMI_SECRET must be set in .env}
      CDR_CSV_PATH: /app/data/asterisk-cdr/Master.csv
      SOUNDS_DIR: /sounds
      # Server Action のハッシュ化を再ビルド間で安定させる (古いタブからの呼び出しが 404 にならない)
      NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY:?must be set in .env}
      # 初期 admin 投入用 (初回起動だけ使う / 必ず変更すること)
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-admin}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      # HTTPS リバプロを置いたときだけ 1 にする (cookie secure 強制)
      COOKIE_SECURE: ${COOKIE_SECURE:-0}
      # event-v1 watcher / push loop の設定。これらは optional。
      # EVENT_PUSH_* が揃ったときだけ push loop が起動し、outbox を command-room に送る。
      EVENT_INBOX_DIR: ${EVENT_INBOX_DIR:-/app/data/inbox}
      EVENT_OUTBOX_V1_DIR: ${EVENT_OUTBOX_V1_DIR:-/app/data/outbox-v1}
      EVENT_RECORDINGS_DIR: ${EVENT_RECORDINGS_DIR:-/app/data/recordings}
      OPENPBX_INSTANCE_ID: ${OPENPBX_INSTANCE_ID:-pbx-dev}
      OPENPBX_WORKSPACE_KEY: ${OPENPBX_WORKSPACE_KEY:-workspace-dev}
      EVENT_COMPUTE_RECORDING_METRICS: ${EVENT_COMPUTE_RECORDING_METRICS:-0}
      EVENT_PUSH_URL: ${EVENT_PUSH_URL:-}
      EVENT_PUSH_TOKEN: ${EVENT_PUSH_TOKEN:-}
      EVENT_PUSH_WORKSPACE_ID: ${EVENT_PUSH_WORKSPACE_ID:-}
      EVENT_PUSH_SOURCE_ACCOUNT_ID: ${EVENT_PUSH_SOURCE_ACCOUNT_ID:-}
      EVENT_PUSH_BATCH: ${EVENT_PUSH_BATCH:-20}
      EVENT_PUSH_TIMEOUT_MS: ${EVENT_PUSH_TIMEOUT_MS:-15000}
      # VoiceBox 連携 (optional): 文章から電話案内 wav を作る別アプリ。
      # 未設定なら /guidances の「文章から電話案内を作る」セクションが無効化される。
      # VoiceBox 本体は command-room-stack-voicebox repo を別 compose で起動する。
      # macOS host で voicebox を動かす場合は VOICEBOX_URL=http://host.docker.internal:3921
      VOICEBOX_URL: ${VOICEBOX_URL:-}
      VOICEBOX_TOKEN: ${VOICEBOX_TOKEN:-}
    networks:
      - openpbx

networks:
  openpbx:
    driver: bridge
