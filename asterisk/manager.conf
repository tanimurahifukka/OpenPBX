; Asterisk Manager Interface (AMI)
; Web container (Docker bridge network: 172.x) から購読する用。
; ホスト側へは publish しない (docker-compose で port mapping しない)。

[general]
enabled = yes
port = 5038
bindaddr = 0.0.0.0

[openpbx]
; secret は entrypoint.sh が AMI_SECRET env から template (.template) を読み込んで差し込む。
; 実 manager.conf は build/起動時に entrypoint で生成される。
secret = __AMI_SECRET__
; Docker bridge ネットワーク (デフォルト 172.16.0.0/12 範囲) のみ許可。
deny = 0.0.0.0/0.0.0.0
permit = 172.0.0.0/255.0.0.0
permit = 127.0.0.1/255.255.255.255
; Web container が必要とする最小権限のみ:
;   read  = system (HostReachable など) / call (Newchannel/Hangup/状態) / agent (PJSIPshowEndpoint) / cdr (CDR集計)
;   write = call (Originate / Redirect / Hangup) / reporting (CoreShowChannels)
read = system,call,agent,cdr
write = call,reporting
