[modules]
autoload=yes

; 不要モジュールはここで noload してもいいが、MVP では autoload に任せる。
; PJSIP / dialplan / MixMonitor (録音) / func_curl / app_system を使う。

; dialplan は extensions.conf (pbx_config) のみ使う。Asterisk 同梱のデフォルト
; extensions.ael / extensions.lua / extensions_minivm.conf / 等が先に load されると
; context 名衝突で pbx_config が "declined to load" になり、すべての dialplan が
; 効かなくなる (例: 1001 → 9001 が "Not Found")。同梱の他言語版を抑止する。
noload => pbx_ael.so
noload => pbx_lua.so
noload => pbx_realtime.so
noload => pbx_dundi.so

; SIP は res_pjsip (PJSIP) のみ使う。chan_sip も autoload されると同じ UDP 5060
; を奪い合い、しばしば chan_sip が先に bind して全 SIP パケットを silently drop
; (peer 未登録なので無反応)。結果 Groundwire 等の REGISTER が PJSIP に届かず
; 「contact が Reachable にならない」「Asterisk が無言で返さない」症状になる。
noload => chan_sip.so
noload => chan_mgcp.so
noload => chan_skinny.so
