; ===========================================================
; Command Room PBX - dialplan
;
; 内線:
;   1001, 1002   ... 内線同士の通話
;
; 特番:
;   9001          ... 当日予約受付チケット作成
;   9002          ... 折返し依頼チケット作成
;
; どちらの特番も System(curl ...) で Web API に POST し、
; その後アナウンスを再生して切る。録音は MixMonitor で保存。
; ===========================================================

[globals]
; docker-compose.yml の environment.WEB_API_BASE_URL を参照
WEB_API_BASE_URL=${ENV(WEB_API_BASE_URL)}
RECORDINGS_DIR=/var/spool/asterisk/monitor

[internal]
; ---- 内線同士の通話 ----
exten => _100X,1,NoOp(Internal call from ${CALLERID(num)} to ${EXTEN})
 same => n,Set(RECORD_FILE=${RECORDINGS_DIR}/${UNIQUEID}-${CALLERID(num)}-to-${EXTEN}.wav)
 same => n,MixMonitor(${RECORD_FILE})
 same => n,Dial(PJSIP/${EXTEN},30)
 same => n,Hangup()

; ---- 9001 当日予約受付 ----
; Answer → 短いアナウンス → ビープ → Record() で発信者の声を録音
; (3秒無音 or 60秒 or # キー or 発信者切断 で終了)
; Hangup 後の通知は h extension で行う。
exten => 9001,1,NoOp(Special 9001: same-day reservation intake from ${CALLERID(num)})
 same => n,Set(EVENT_KIND=same_day_reservation)
 same => n,Set(EVENT_EXT=9001)
 same => n,Set(RECORD_FILE=${RECORDINGS_DIR}/${UNIQUEID}-9001-${CALLERID(num)}.wav)
 same => n,Answer()
 same => n,Wait(1)
 same => n,Playback(vm-intro)
 same => n,Playback(beep)
 same => n,Record(${RECORD_FILE},3,60,k)
 same => n,Playback(auth-thankyou)
 same => n,Hangup()

; ---- 9002 折返し依頼 ----
exten => 9002,1,NoOp(Special 9002: callback request from ${CALLERID(num)})
 same => n,Set(EVENT_KIND=callback_request)
 same => n,Set(EVENT_EXT=9002)
 same => n,Set(RECORD_FILE=${RECORDINGS_DIR}/${UNIQUEID}-9002-${CALLERID(num)}.wav)
 same => n,Answer()
 same => n,Wait(1)
 same => n,Playback(vm-intro)
 same => n,Playback(beep)
 same => n,Record(${RECORD_FILE},3,60,k)
 same => n,Playback(auth-thankyou)
 same => n,Hangup()

; ---- Hangup extension ----
; Record() がハングアップで終了すると後続ステップは走らない。
; その代わり Asterisk は同じ context の "h" extension を実行するので、
; ここで Web API への通知をまとめて投げる。
;
; dialplan の System() で curl + JSON を直書きするとカンマや括弧が
; dialplan parser を壊すので、引数を bash スクリプトに渡す方式にしている。
exten => h,1,NoOp(Hangup handler for ${EVENT_EXT} from ${CALLERID(num)})
 same => n,GotoIf($["${EVENT_KIND}" = ""]?nokind)
 same => n,System(/usr/local/bin/notify-event.sh "${EVENT_KIND}" "${EVENT_EXT}" "${CALLERID(num)}" "${CALLERID(name)}" "${UNIQUEID}" "${RECORD_FILE}" "${WEB_API_BASE_URL}")
 same => n(nokind),Return()

; ---- 9000 IVR メニュー ----
; 9000 にかけると IVR が動く。
;   1 → 9001 のフローへ (当日予約録音)
;   2 → 9002 のフローへ (折返し依頼録音)
;   0 → 内線 1001 (受付スタッフ) へダイヤル
;   無入力/不正入力は 3 回までリトライ。
exten => 9000,1,NoOp(IVR entry from ${CALLERID(num)})
 same => n,Answer()
 same => n,Wait(1)
 same => n,Playback(custom/ivr-welcome)
 same => n,Set(IVR_TRIES=0)
 same => n,Goto(ivr-menu,1)

exten => ivr-menu,1,Set(IVR_TRIES=$[${IVR_TRIES} + 1])
 same => n,GotoIf($[${IVR_TRIES} > 3]?give-up)
 same => n,Background(custom/ivr-menu)
 same => n,WaitExten(6)
 same => n(give-up),Playback(custom/ivr-goodbye)
 same => n,Hangup()

; ---- IVR 選択肢 ----
exten => 1,1,NoOp(IVR option 1: same-day reservation)
 same => n,Goto(9001,1)
exten => 2,1,NoOp(IVR option 2: callback request)
 same => n,Goto(9002,1)
exten => 0,1,NoOp(IVR option 0: transfer to staff 1001)
 same => n,Playback(custom/ivr-transferring)
 same => n,Dial(PJSIP/1001,30)
 same => n,Playback(custom/ivr-goodbye)
 same => n,Hangup()

; ---- IVR タイムアウト / 無効入力 ----
exten => t,1,Playback(custom/ivr-invalid)
 same => n,Goto(ivr-menu,1)
exten => i,1,Playback(custom/ivr-invalid)
 same => n,Goto(ivr-menu,1)

; ---- 動的 dialplan の取り込み ----
; Web の Server Action が dialplan.d/*.conf を書き出すので、ここで include する。
; ファイルが無くても起動失敗にはならない (Asterisk は無視する)。
#include "dialplan.d/*.conf"

; ---- 不一致 ----
exten => _X.,1,NoOp(Unknown extension: ${EXTEN})
 same => n,Playback(invalid)
 same => n,Hangup()
