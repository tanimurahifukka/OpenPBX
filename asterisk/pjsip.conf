; ===========================================================
; Command Room PBX - PJSIP テンプレート
; 各内線エンドポイントは pjsip.d/*.conf に動的書き出し。
; 端末管理ページ (/extensions) から変更 → 自動 reload。
; ===========================================================

;
; Transport
;
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5060

[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0:8089
; 証明書は asterisk/certs/ にユーザが mkcert で作成した自己署名を bind mount
cert_file=/etc/asterisk/certs/asterisk.pem
priv_key_file=/etc/asterisk/certs/asterisk.key

;
; テンプレート: 内線エンドポイント
;
[endpoint-internal](!)
type=endpoint
context=internal
disallow=all
allow=ulaw
allow=alaw
allow=opus
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes

; WebRTC 用テンプレート (SRTP / ICE / AVPF / WSS)
[endpoint-webrtc](!)
type=endpoint
context=internal
disallow=all
allow=opus
allow=ulaw
allow=alaw
webrtc=yes
use_avpf=yes
media_use_received_transport=yes
rtcp_mux=yes
dtls_auto_generate_cert=yes
dtls_verify=fingerprint
ice_support=yes
transport=transport-wss
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes

[auth-userpass](!)
type=auth
auth_type=userpass

[aor-single](!)
type=aor
max_contacts=2
remove_existing=yes
qualify_frequency=30

; 動的に管理される endpoint 定義を取り込む。
; ファイルが空でも Asterisk は起動できる (ロード時点で endpoint が無いだけ)。
#include "pjsip.d/extensions.conf"
