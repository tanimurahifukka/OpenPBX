; ===========================================================
; OpenPBX - Music on Hold
;
; 単一の [default] クラスのみ。保留 / 転送 / Dial(...,m) のリングバック中に
; 流れる保留音。音源は Docker イメージに入れた asterisk-moh-opsound-wav
; (ロイヤリティフリーの "opsound" 楽曲) を /usr/share/asterisk/moh から再生する。
;
; 院内独自の保留音に差し替えたい場合は同ディレクトリに 8kHz/16bit mono の
; WAV を置き、コンテナを再起動する (res_musiconhold は起動時にスキャンする)。
; ===========================================================

[general]

[default]
mode=files
directory=/usr/share/asterisk/moh
sort=random
